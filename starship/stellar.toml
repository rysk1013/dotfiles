#                                #
# Starship Config by a3chron     #
# https://stellar-hub.vercel.app #
#                                #

palette = "catppuccin_mocha"

# custom format
format = """
[╭─ $shell─╌╌$sudo$username$localip──╌╌ $php$nodejs$python$golang$lua](overlay0)
[├╌](overlay0) $directory$read_only$git_branch$git_commit$git_status(overlay0)
[╰─$character](overlay0)"""

# Wait 10 milliseconds for starship to check files under the current directory.
scan_timeout = 10
command_timeout = 500
add_newline = true

# Catppuchin Theme
[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"

[shell]
fish_indicator = 'fish'
bash_indicator = 'bash'
unknown_indicator = 'unknwn'
style = 'teal'
disabled = false

[nix_shell]
disabled = false
impure_msg = '[\[impure\]](flamingo)'
pure_msg = '[\[pure\]](sapphire)'
unknown_msg = '[\[unknown\]](dimmed sapphire)'
format = '╌╌ [$name](dimmed teal)$state ╌╌'

[sudo]
format = ' [sudo](bold red)'
disabled = false

[username]
style_user = 'bold blue'
format = ' [$user@]($style)'
disabled = false
show_always = true

[localip]
ssh_only = false
format = '[$localipv4](bold dimmed blue) '
disabled = false

[python]
symbol = ''
format = '[Python](bold mauve) [$version [\($virtualenv\)](dimmed mauve)](dimmed mauve)'
pyenv_version_name = true
detect_files = ['requirements.txt', '__init.py__', 'setup.py']
detect_extensions = ['py']
detect_folders = []

[nodejs]
format = '[Node](bold lavender) [$version](bold dimmed lavender) '

[golang]
format = '[Go](bold lavender) [$version](bold dimmed lavender) '

[php]
format = '[PHP](bold lavender) [$version](bold dimmed lavender) '

[lua]
format = '[Lua](bold lavender) [$version](bold dimmed lavender) '

[memory_usage]
disabled = false
threshold = -1
format = '[$ram_pct]($style)'
symbol = ''
style = 'dimmed blue'

[hostname]
ssh_only = false
ssh_symbol = 'ssh:'
format = '[$ssh_symbol](bold dimmed maroon)[$hostname](bold dimmed sapphire)'
trim_at = ''
disabled = false

[directory]
fish_style_pwd_dir_length = 5
disabled = false
truncation_length = 5
truncation_symbol = '…/'
read_only = ' read-only'
read_only_style = 'bold dimmed mauve'
style = 'bold teal'

[git_metrics]
disabled = false
format = ' [+$added](bold teal)[-$deleted](bold pink)'

[git_branch]
format = '[$branch(:$remote_branch)]($style)'
style = 'bold blue'

[git_status]
format = '([\[$all_status$ahead_behind\]](bold pink))'

[git_commit]
format = ' [$tag](dimmed blue)'
tag_disabled = false
tag_symbol = ''
only_detached = false

# time of command
[cmd_duration]
min_time = 500
format = '[\[$duration\]](bold dimmed blue) '

# prompt char
[character]
success_symbol = '(overlay0)'
error_symbol = '[ X](red)'

# Disable the package module, hiding it from the prompt completely
[package]
disabled = true
