format = """
[‚ĖĎ‚Ėí‚Ėď](#a9b1d6)\
$username\
[Óāį](fg:#a9b1d6 bg:#7aa2f7)\
$directory\
[Óāį](fg:#7aa2f7 bg:#394260)\
$git_branch\
$git_status\
[Óāį](fg:#394260)\
\n$character
"""

right_format = """
$php\
$nodejs\
$golang\
$time\
"""

[username]
show_always = true
style_user = "fg:#090c0c bg:#a9b1d6"
style_root = "fg:#090c0c bg:#a9b1d6"
format = '[ $user ]($style)'

[directory]
style = "fg:#e3e5e5 bg:#7aa2f7"
format = '[ $path ]($style)'
truncation_length = 1000
truncate_to_repo = false

[git_branch]
symbol = "Ôźė"
style = "fg:#769ff0 bg:#394260"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "fg:#769ff0 bg:#394260"
format = '([\[$all_status$ahead_behind\]]($style))'

[php]
symbol = "ÓúĹ"
style = "fg:#ffff00"
format = '[ Óā≥ $symbol $version ]($style)'

[nodejs]
symbol = "Óúė"
style = "fg:#ffff00"
format = '[ Óā≥ $symbol $version ]($style)'

[golang]
symbol = "ůįüď"
style = "fg:#ffff00"
format = '[ Óā≥ $symbol $version ]($style)'

[time]
disabled = false
time_format = "%R"
style = "fg:#73daca"
format = '[ Óā≥ Ôźļ $time ]($style)'

[character]
success_symbol = "[‚ĚĮ](bold #00ff00)"
error_symbol = "[‚ĚĮ](bold #FF0000)"
